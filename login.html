<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='80'%3E🐂%3C/text%3E%3C/svg%3E">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PedidoDireto – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body class="login-body">

  <div class="login-bg">
    <div class="login-grain"></div>
    <div class="login-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
  </div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-icon">🥩</div>
        <h1 class="brand-name">Pedido<span>Direto</span></h1>
        <p class="brand-tagline">Gestão de Pedidos & Produção</p>
      </div>

      <div class="login-form-area">
        <div id="login-error" class="alert alert-error" style="display:none"></div>
        <div id="login-success" class="alert alert-success" style="display:none"></div>

        <div class="input-group">
          <label>Usuário</label>
          <input type="text" id="login-username" placeholder="Digite seu usuário" autocomplete="off" />
        </div>
        <div class="input-group">
          <label>Senha</label>
          <div class="password-wrap">
            <input type="password" id="login-password" placeholder="Digite sua senha" />
            <button class="toggle-pw" data-state="show" onclick="togglePassword('login-password', this)"><svg
                class="eye-open" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg><svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="m15 18-.722-3.25" />
                <path d="M2 8a10.645 10.645 0 0 0 20 0" />
                <path d="m20 15-1.726-2.05" />
                <path d="m4 15 1.726-2.05" />
                <path d="m9 18 .722-3.25" />
              </svg></button>
          </div>
        </div>

        <button class="btn btn-primary btn-full" id="btn-login" onclick="handleLogin()">
          <span class="btn-text">Entrar</span>
          <span class="btn-loader" style="display:none">⏳</span>
        </button>
      </div>

      <div class="login-footer">
        ©
        <span id="year">2026</span>
        FribalTech — Todos os direitos reservados
      </div>
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="login.js"></script>
</body>

</footer> -->

</html>
