<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Venda Direta – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">

  <div class="login-bg">
    <div class="login-grain"></div>
    <div class="login-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
  </div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-icon">🥩</div>
        <h1 class="brand-name">Venda<span>Direta</span></h1>
        <p class="brand-tagline">Gestão de Pedidos & Produção</p>
      </div>

      <div class="login-form-area">
        <div id="login-error" class="alert alert-error" style="display:none"></div>
        <div id="login-success" class="alert alert-success" style="display:none"></div>

        <div class="input-group">
          <label>Usuário</label>
          <input type="text" id="login-username" placeholder="Digite seu usuário" autocomplete="off" />
        </div>
        <div class="input-group">
          <label>Senha</label>
          <div class="password-wrap">
            <input type="password" id="login-password" placeholder="Digite sua senha" />
            <button class="toggle-pw" onclick="togglePassword('login-password', this)">👁</button>
          </div>
        </div>

        <button class="btn btn-primary btn-full" id="btn-login" onclick="handleLogin()">
          <span class="btn-text">Entrar</span>
          <span class="btn-loader" style="display:none">⏳</span>
        </button>
      </div>

      <div class="login-footer">
        <p>Sistema interno · Acesso restrito</p>
      </div>
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="login.js"></script>
</body>
</html>
