<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Venda Direta – Produção</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-brand">
      <span class="brand-icon-sm">🥩</span>
      <span class="brand-name-sm">CARNESYSTEM</span>
      <span class="role-badge">PRODUÇÃO</span>
    </div>
    <div class="header-user">
      <button class="btn btn-ghost btn-sm" onclick="loadAllOrders()">↻ Atualizar</button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sair</button>
    </div>
  </header>

  <!-- MASTER PANEL (visível só para master) -->
  <div id="master-panel" class="master-panel" style="display:none">
    <div class="master-panel-inner card">
      <div class="section-header">
        <h2 class="section-title">👑 Painel Master – Gerenciar Vendedores</h2>
        <button class="btn btn-primary btn-sm" onclick="openAddVendorModal()">+ Novo Vendedor</button>
      </div>
      <div id="vendors-loading" class="loading-msg">Carregando vendedores...</div>
      <div id="vendors-empty" class="empty-msg" style="display:none">Nenhum vendedor cadastrado.</div>
      <div id="vendors-list" style="display:none">
        <table class="orders-table">
          <thead>
            <tr><th>Usuário</th><th>Nome</th><th>Criado em</th><th>Ação</th></tr>
          </thead>
          <tbody id="vendors-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- KANBAN -->
  <main class="kanban-main">

    <!-- A Fazer -->
    <div class="kanban-col" id="col-todo">
      <div class="kanban-col-header todo">
        <span class="col-icon">🔴</span>
        <h3>A Fazer</h3>
        <span class="col-count" id="count-todo">0</span>
      </div>
      <div class="kanban-cards" id="cards-todo"></div>
    </div>

    <!-- Em Andamento -->
    <div class="kanban-col" id="col-progress">
      <div class="kanban-col-header progress">
        <span class="col-icon">🟡</span>
        <h3>Em Andamento</h3>
        <span class="col-count" id="count-progress">0</span>
      </div>
      <div class="kanban-cards" id="cards-progress"></div>
    </div>

    <!-- Concluído -->
    <div class="kanban-col" id="col-done">
      <div class="kanban-col-header done">
        <span class="col-icon">🟢</span>
        <h3>Concluído</h3>
        <span class="col-count" id="count-done">0</span>
      </div>
      <div class="kanban-cards" id="cards-done"></div>
    </div>

  </main>

  <!-- MODAL: Adicionar Vendedor -->
  <div id="modal-vendor" class="modal-overlay" style="display:none" onclick="closeModalOutside(event)">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Novo Vendedor</h3>
        <button class="modal-close" onclick="closeAddVendorModal()">✕</button>
      </div>
      <div id="modal-error" class="alert alert-error" style="display:none"></div>
      <div id="modal-success" class="alert alert-success" style="display:none"></div>
      <div class="input-group">
        <label>Nome Completo *</label>
        <input type="text" id="new-vendor-name" placeholder="Ex: João Silva" />
      </div>
      <div class="input-group">
        <label>Usuário (login) *</label>
        <input type="text" id="new-vendor-username" placeholder="Ex: joao.silva" />
      </div>
      <div class="input-group">
        <label>Senha *</label>
        <div class="password-wrap">
          <input type="password" id="new-vendor-password" placeholder="Mínimo 6 caracteres" />
          <button class="toggle-pw" onclick="togglePassword('new-vendor-password', this)">👁</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeAddVendorModal()">Cancelar</button>
        <button class="btn btn-primary" id="btn-create-vendor" onclick="createVendor()">
          <span class="btn-text">Criar Vendedor</span>
          <span class="btn-loader" style="display:none">⏳</span>
        </button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast" style="display:none"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="producao.js"></script>
</body>
</html>
