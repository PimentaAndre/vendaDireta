<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='80'%3E🐂%3C/text%3E%3C/svg%3E">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PedidoDireto – Produção</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    .kanban-card-delivery {
      font-size: 0.78rem;
      margin-top: 6px;
      padding: 4px 8px;
      border-radius: 6px;
      display: inline-block;
    }
    .delivery-ok       { background: #e8f5e9; color: #2e7d32; }
    .delivery-tomorrow { background: #fff8e1; color: #f57f17; }
    .delivery-today    { background: #fff3e0; color: #e65100; font-weight: 600; }
    .delivery-overdue  { background: #fdecea; color: #c62828; font-weight: 700; animation: pulse-red 1.2s infinite; }
    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }
  </style>
</head>
<body class="app-body">
 
  <!-- HEADER -->
  <header class="app-header">
    <div class="header-brand">
      <span class="brand-icon-sm">🥩</span>
      <span class="brand-name-sm">PedidoDireto</span>
      <span class="role-badge">PRODUÇÃO</span>
    </div>
    <div class="header-user">
      <a id="btn-dashboard" href="dashboard.html" class="btn btn-sm" style="display:none;background:var(--gold);color:var(--coal);font-weight:700;text-decoration:none">📊 Dashboard</a>
      <a id="btn-master" href="master.html" class="btn btn-sm" style="display:none;background:var(--coal-3);color:var(--text-main);border:1px solid var(--coal-4);font-weight:700;text-decoration:none">👑 Painel Master</a>
      <button class="btn btn-ghost btn-sm" onclick="loadAllOrders()">↻ Atualizar</button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sair</button>
    </div>
  </header>
 
  <!-- KANBAN -->
  <main class="kanban-main">
 
    <div class="kanban-col" id="col-todo">
      <div class="kanban-col-header todo">
        <span class="col-icon">🔴</span>
        <h3>A Fazer</h3>
        <span class="col-count" id="count-todo">0</span>
      </div>
      <div class="kanban-cards" id="cards-todo"></div>
    </div>
 
    <div class="kanban-col" id="col-progress">
      <div class="kanban-col-header progress">
        <span class="col-icon">🟡</span>
        <h3>Em Andamento</h3>
        <span class="col-count" id="count-progress">0</span>
      </div>
      <div class="kanban-cards" id="cards-progress"></div>
    </div>
 
    <div class="kanban-col" id="col-done">
      <div class="kanban-col-header done">
        <span class="col-icon">🟢</span>
        <h3>Concluído</h3>
        <span class="col-count" id="count-done">0</span>
      </div>
      <div class="kanban-cards" id="cards-done"></div>
    </div>
 
  </main>
 
  <!-- TOAST -->
  <div id="toast" class="toast" style="display:none"></div>

  <!-- MODAL: Detalhes do Pedido -->
  <div id="modal-order-detail" class="modal-overlay" style="display:none" onclick="if(event.target.id==='modal-order-detail')closeDetailModal()">
    <div class="modal-box modal-detail-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div>
          <h3 id="detail-title">Detalhes do Pedido</h3>
          <span id="detail-id" style="font-size:0.72rem;color:var(--text-muted);letter-spacing:1px"></span>
        </div>
        <button class="modal-close" onclick="closeDetailModal()">✕</button>
      </div>

      <!-- Status badge -->
      <div style="margin-bottom:20px">
        <span id="detail-status-badge" class="status-badge"></span>
      </div>

      <!-- Info Grid -->
      <div class="detail-grid">
        <div class="detail-field">
          <span class="detail-field-label">👤 Cliente:</span>
          <span class="detail-field-value" id="detail-client"></span>
        </div>
        <div class="detail-field">
          <span class="detail-field-label">🧑‍💼 Vendedor:</span>
          <span class="detail-field-value" id="detail-vendor"></span>
        </div>
        <div class="detail-field">
          <span class="detail-field-label">📅 Pedido Concluído em:</span>
          <span class="detail-field-value" id="detail-created"></span>
        </div>
        <div class="detail-field">
          <span class="detail-field-label">🚚 Entregar Pedido em:</span>
          <span class="detail-field-value" id="detail-delivery"></span>
        </div>
      </div>

      <!-- Cortes -->
      <div class="detail-cuts-section">
        <span class="detail-section-label">🔪 Cortes do Pedido</span>
        <div id="detail-cuts-list" class="detail-cuts-list"></div>
        <div class="detail-total-row">
          <span>Total</span>
          <span id="detail-total-kg" class="detail-total-value"></span>
        </div>
      </div>

      <!-- Observações -->
      <div id="detail-obs-wrap" class="detail-obs-wrap" style="display:none">
        <span class="detail-section-label">💬 Observações</span>
        <p id="detail-obs" class="detail-obs-text"></p>
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeDetailModal()">Fechar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="producao.js"></script>
</body>
</html>
